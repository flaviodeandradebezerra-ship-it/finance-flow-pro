<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Finance Flow Pro</title>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body>
    <aside class="rail" aria-label="Navegacao principal">
      <div class="brand-mark">FF</div>
      <button class="rail-button active" title="Painel">⌂</button>
      <button class="rail-button" title="Fluxo">↗</button>
      <button class="rail-button" title="Credito">$</button>
      <button class="rail-button" title="IA">✦</button>
    </aside>

    <main class="shell">
      <header class="topbar">
        <section>
          <p class="eyebrow">Finance Flow Pro</p>
          <h1>Decisoes financeiras em uma tela</h1>
          <p class="subtitle">Caixa, credito, alertas e acoes prioritarias para PMEs, sem navegar por varios menus.</p>
        </section>
        <section class="top-actions" aria-label="Acoes rapidas">
          <button id="refreshButton" class="primary-button">Atualizar painel</button>
          <button class="secondary-button">Open Finance</button>
        </section>
      </header>

      <section class="quick-actions" aria-label="Atalhos">
        <button><span>⚡</span>Resolver caixa<span>3 passos</span></button>
        <button><span>✉</span>Cobrar clientes<span>R$ 18k</span></button>
        <button><span>$</span>Simular credito<span>2 min</span></button>
        <button><span>⇩</span>Enviar contador<span>PDF</span></button>
      </section>

      <section id="metrics" class="metrics" aria-label="Indicadores principais"></section>

      <section class="workspace">
        <article class="panel cash-panel">
          <div class="panel-header">
            <div>
              <p class="eyebrow">Fluxo de caixa</p>
              <h2>Realizado + previsto</h2>
            </div>
            <button class="icon-button" title="Ampliar grafico">□</button>
          </div>
          <div id="chart" class="chart" aria-label="Grafico de fluxo"></div>
          <div id="chips" class="chips"></div>
        </article>

        <article class="panel ai-panel">
          <div class="panel-header">
            <div>
              <p class="eyebrow">Copiloto financeiro</p>
              <h2>O que fazer agora</h2>
            </div>
            <span class="status-dot"></span>
          </div>
          <p id="aiAnswer" class="ai-answer">Analisando dados financeiros...</p>
          <button id="askCreditButton" class="primary-button wide-button">Perguntar sobre credito</button>
          <ul id="alerts" class="signal-list"></ul>
        </article>
      </section>

      <section class="panel decision-panel">
        <div class="panel-header">
          <div>
            <p class="eyebrow">Poucos cliques</p>
            <h2>Fila de decisoes</h2>
          </div>
          <div class="segmented" role="group" aria-label="Periodo">
            <button class="active">Hoje</button>
            <button>Semana</button>
            <button>Contador</button>
          </div>
        </div>
        <div id="actions" class="decision-list"></div>
      </section>
    </main>

    <script src="/assets/app.js"></script>
  </body>
</html>
